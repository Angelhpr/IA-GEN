services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ia-gen-backend:local
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ia-gen-vector-db:/app/data/vector_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: ia-gen-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  ia-gen-vector-db:
    name: ia-gen-vector-db
